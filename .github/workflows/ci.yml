name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Install Psych-DS validator
        run: npm install -g psychds-validator

      - name: Check generated skill docs
        run: python scripts/render_skill_catalog.py --check

      - name: Run tests
        run: pytest -q
